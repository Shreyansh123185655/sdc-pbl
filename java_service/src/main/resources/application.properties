# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=student-pdf-service

# ── PDF Output ───────────────────────────────────────────────────────────────
# Absolute or relative path where PDFs will be saved permanently.
# Change this to any local directory you prefer.
pdf.output.dir=./output

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.studentpdf=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%-20.20t] %logger{36} : %msg%n

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
